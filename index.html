<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MedTracker Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007AFF">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-main">
                <div style="width: 40px;"></div>
                <h1>My Meds</h1>
                <button id="notif-btn">🔔</button>
            </div>
            <div id="sync-display" class="sync-status">auto-deduct every 24 hours</div>
        </header>

        <section class="card setup-card">
            <div class="input-stack">
                <label>MEDICINE NAME</label>
                <select id="med-selector"><option value="">-- Choose from list --</option></select>
                <input type="text" id="custom-name" placeholder="Or type custom name...">
                <div class="stats-grid">
                    <div><label>TOTAL STOCK</label><input type="number" id="new-stock" placeholder="0"></div>
                    <div><label>DAILY DOSE</label><input type="text" id="new-freq" placeholder="e.g. 1 or 2-3"></div>
                </div>
                <button id="add-track-btn" class="primary-btn">Start Tracking</button>
            </div>
        </section>

        <div id="med-list"></div>

        <div id="refill-modal" class="modal-overlay">
            <div class="modal-content">
                <h3>Existing Med Found</h3>
                <p id="modal-body"></p>
                <div class="modal-actions">
                    <button id="modal-add" class="modal-btn primary">ADD TO STOCK</button>
                    <button id="modal-replace" class="modal-btn secondary">REPLACE STOCK</button>
                    <button id="modal-cancel" class="modal-btn cancel">CANCEL</button>
                </div>
            </div>
        </div>

        <div id="undo-toast" class="toast">
            <span>Dose tracked</span>
            <button onclick="App.undo()">UNDO</button>
        </div>

        <div class="footer-actions">
            <button id="edit-mode-btn" class="edit-btn-footer">EDIT</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
