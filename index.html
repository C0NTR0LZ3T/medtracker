<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MedTracker Pro</title>
    <link rel="stylesheet" href="style.css">
    <meta name="apple-mobile-web-app-capable" content="yes">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>My Meds</h1>
            <div id="sync-display" class="sync-status">auto-deduct every 24 hours</div>
        </header>

        <section class="card setup-card">
            <div class="input-stack">
                <label>MEDICINE NAME</label>
                <select id="med-selector">
                    <option value="">-- Choose from list --</option>
                </select>
                <input type="text" id="custom-name" placeholder="Or type custom name...">
                
                <div class="stats-grid">
                    <div>
                        <label>TOTAL STOCK</label>
                        <input type="number" id="new-stock" placeholder="0">
                    </div>
                    <div>
                        <label>DAILY DOSE</label>
                        <input type="number" id="new-freq" placeholder="0">
                    </div>
                </div>
                <button id="add-track-btn" class="primary-btn">Start Tracking</button>
            </div>
        </section>

        <div id="med-list"></div>

        <div class="footer-actions">
            <button id="edit-mode-btn" class="edit-btn-footer">EDIT</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
